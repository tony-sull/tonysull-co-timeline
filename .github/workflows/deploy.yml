name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required repository secrets:
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token with Workers deploy permission
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID
#   NPM_TOKEN             — your IndiePub license token for @indiepub/* packages

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure private registry
        run: |
          echo "@indiepub:registry=https://registry.indiepub.dev" >> .npmrc
          echo "//registry.indiepub.dev/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy site
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Deploy scheduler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c wrangler.scheduler.toml
